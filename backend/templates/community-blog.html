<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Blog - Fossil Contracting</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <nav class="navbar">
                <div class="logo">
                    <img src="/static/images/logo.png" alt="Fossil Contracting" class="logo-img">
                </div>
                <ul class="nav-menu" id="navMenu">
                    <li><a href="/">Home</a></li>
                    <li><a href="/anonymous-feedback/">Feedback</a></li>
                    <li><a href="/community-blog/" class="active">Community</a></li>
                </ul>
                <div class="nav-buttons">
                    <a href="/" class="btn-primary">Back to Home</a>
                </div>
            </nav>
        </div>
    </header>

    <main style="margin-top: 80px; padding: 60px 0;">
        <div class="container" style="max-width: 900px;">
            <div class="section-header">
                <h1 class="section-title">Community Blog</h1>
                <p class="section-subtitle">Share ideas, stories, and insights with our community</p>
            </div>
            
            <div style="background: white; border-radius: 20px; padding: 32px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin-bottom: 48px;">
                <h2 style="color: #166534; margin-bottom: 24px;">Create a Post</h2>
                <form id="blogForm">
                    <div style="margin-bottom: 20px;">
                        <label style="display: block; margin-bottom: 8px; color: #1f2937; font-weight: 600;">Author Name</label>
                        <input type="text" name="author" placeholder="Your name (optional)" style="width: 100%; padding: 12px; border: 1px solid #e5e7eb; border-radius: 8px; font-family: inherit;">
                    </div>
                    <div style="margin-bottom: 20px;">
                        <label style="display: block; margin-bottom: 8px; color: #1f2937; font-weight: 600;">Post Title</label>
                        <input type="text" name="title" required placeholder="What's on your mind?" style="width: 100%; padding: 12px; border: 1px solid #e5e7eb; border-radius: 8px; font-family: inherit;">
                    </div>
                    <div style="margin-bottom: 20px;">
                        <label style="display: block; margin-bottom: 8px; color: #1f2937; font-weight: 600;">Content</label>
                        <textarea name="content" rows="8" required placeholder="Share your thoughts..." style="width: 100%; padding: 12px; border: 1px solid #e5e7eb; border-radius: 8px; font-family: inherit; resize: vertical;"></textarea>
                    </div>
                    <button type="submit" class="btn-primary" style="padding: 12px 24px; border: none; cursor: pointer;">Publish Post</button>
                </form>
            </div>

            <div id="blogPosts">
                <h2 style="color: #166534; margin-bottom: 24px;">Latest Posts</h2>
                <div id="postsContainer" style="display: grid; gap: 24px;">
                    <!-- Posts loaded via JavaScript -->
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-grid">
                <div class="footer-col">
                    <span>© 2025 Fossil Contracting</span>
                </div>
            </div>
        </div>
    </footer>

    <script>
    const reactionEmojis = ['👍', '❤️', '😂', '😮', '😢', '😠'];

    async function addBlogReaction(postId, emoji) {
        try {
            const res = await fetch('http://localhost:8000/api/reactions/add/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    emoji: emoji,
                    content_type: 'blogpost',
                    object_id: postId
                })
            });
            if (res.ok) {
                loadBlogPosts();
            }
        } catch (error) {
            console.error('Error adding reaction:', error);
        }
    }

    async function loadBlogPosts() {
        const postsData = await fetch('http://localhost:8000/api/blog/posts/').then(r => r.json()).catch(e => {
            console.error('Failed to load posts:', e);
            return [];
        });

        const postsContainer = document.getElementById('postsContainer');
        if (postsData && postsData.length > 0) {
            postsContainer.innerHTML = postsData.map(post => `
                <div style="background: white; border-radius: 12px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.05);">
                    <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 16px;">
                        <div>
                            <h3 style="color: #166534; margin-bottom: 4px; font-size: 20px;">${post.title}</h3>
                            <p style="color: #9ca3af; font-size: 14px;">By ${post.author || 'Anonymous'} • ${new Date(post.created_at).toLocaleDateString()}</p>
                        </div>
                        ${post.is_pinned ? '<span style="background: #fef3c7; color: #b45309; padding: 4px 12px; border-radius: 50px; font-size: 12px; font-weight: 600;">📌 Pinned</span>' : ''}
                    </div>
                    <p style="color: #4b5563; line-height: 1.6; margin-bottom: 16px;">${post.content.substring(0, 200)}...</p>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; border-top: 1px solid #e5e7eb; padding-top: 12px;">
                        <div style="display: flex; gap: 4px; flex-wrap: wrap;">
                            ${reactionEmojis.map(emoji => `
                                <button onclick="addBlogReaction(${post.id}, '${emoji}')" style="background: #f3f4f6; border: 1px solid #e5e7eb; padding: 4px 8px; border-radius: 6px; cursor: pointer; font-size: 14px; transition: all 0.2s; display: flex; align-items: center; gap: 4px;">
                                    <span>${emoji}</span>
                                </button>
                            `).join('')}
                        </div>
                        <div style="display: flex; gap: 16px; font-size: 13px; color: #6b7280; justify-content: flex-end;">
                            <span>💬 ${post.comment_count || 0} Comments</span>
                            <span>👁️ ${post.view_count} Views</span>
                        </div>
                    </div>
                </div>
            `).join('');
        } else {
            postsContainer.innerHTML = '<p style="color: #6b7280; text-align: center;">No posts yet. Be the first to share!</p>';
        }
    }

    document.addEventListener('DOMContentLoaded', function() {
        loadBlogPosts();
    });

    document.getElementById('blogForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const formData = new FormData(this);
        const data = {
            title: formData.get('title'),
            content: formData.get('content'),
            author: formData.get('author') || 'Anonymous'
        };

        try {
            const response = await fetch('http://localhost:8000/api/blog/posts/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if (response.ok) {
                alert('✓ Post published! Refresh to see your post.');
                this.reset();
                location.reload();
            } else {
                alert('Failed to publish post. Please try again.');
            }
        } catch (error) {
            alert('Error: ' + error.message);
        }
    });

    async function likePost(postId) {
        try {
            await fetch(`http://localhost:8000/api/blog/posts/${postId}/like/`, { method: 'POST' });
            location.reload();
        } catch (error) {
            alert('Error liking post');
        }
    }
    </script>
    <script src="/static/js/api.js"></script>
    <script src="/static/js/main.js"></script>
</body>
</html>
